name: Build and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v0.1.0). Leave empty to only upload the zip as a workflow artifact without creating a release.'
        required: false
        type: string

jobs:
  build:
    name: Build Windows x64 (Vulkan)
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      VULKAN_SDK_VERSION: 1.3.290.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Vulkan SDK
        id: vulkan-cache
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}
          key: vulkan-sdk-${{ env.VULKAN_SDK_VERSION }}-windows-x64

      - name: Install Vulkan SDK
        if: steps.vulkan-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ver = "${{ env.VULKAN_SDK_VERSION }}"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Write-Host "Downloading Vulkan SDK $ver from $url"
          Invoke-WebRequest -Uri $url -OutFile vulkan-sdk.exe
          $p = Start-Process -FilePath vulkan-sdk.exe `
                             -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" `
                             -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "Vulkan SDK install failed (exit $($p.ExitCode))" }

      - name: Export Vulkan SDK env
        shell: pwsh
        run: |
          $sdk = "C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}"
          if (-not (Test-Path $sdk)) { throw "Vulkan SDK missing at $sdk" }
          "VULKAN_SDK=$sdk"     | Out-File -FilePath $env:GITHUB_ENV   -Append
          "$sdk\Bin"            | Out-File -FilePath $env:GITHUB_PATH  -Append

      - name: Configure (CMake, VS 2022, Vulkan, static MSVC runtime)
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DQWEN3_TTS_EMBED_GGML=ON `
            -DGGML_VULKAN=ON `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build qwen3-tts-server (Release)
        shell: pwsh
        run: cmake --build build --target qwen3-tts-server --config Release --parallel

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "dist/qwen3-tts-server-windows-vulkan-x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build/Release/qwen3-tts-server.exe $stage
          Copy-Item build/bin/Release/*.dll            $stage
          Copy-Item README.md                          $stage
          Write-Host "Staged files:"
          Get-ChildItem $stage | Format-Table Name, Length -AutoSize

      - name: Determine archive name
        id: name
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF -like "refs/tags/*") {
            $env:GITHUB_REF -replace "refs/tags/", ""
          } elseif ("${{ inputs.version }}") {
            "${{ inputs.version }}"
          } else {
            "dev-$(git rev-parse --short HEAD)"
          }
          $zip = "qwen3-tts-server-$ver-windows-vulkan-x64.zip"
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Archive
        shell: pwsh
        run: |
          $zip = "${{ steps.name.outputs.zip }}"
          Compress-Archive -Path "dist/qwen3-tts-server-windows-vulkan-x64/*" -DestinationPath $zip -Force
          Write-Host "Created $zip ($([int]((Get-Item $zip).Length / 1MB)) MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-tts-server-windows-vulkan-x64
          path: ${{ steps.name.outputs.zip }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          name: ${{ inputs.version || github.ref_name }}
          files: ${{ steps.name.outputs.zip }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.version || github.ref_name, '-') }}
