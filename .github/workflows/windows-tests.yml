name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build qwen3-tts-server (Windows, CPU)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DQWEN3_TTS_EMBED_GGML=ON

      - name: Build qwen3-tts-server
        shell: pwsh
        run: cmake --build build --target qwen3-tts-server --config Release --parallel

      - name: Smoke test (--help)
        shell: pwsh
        run: |
          Copy-Item build/bin/Release/*.dll build/Release/
          & build/Release/qwen3-tts-server.exe --help
          if ($LASTEXITCODE -ne 0) { throw "server --help failed (exit $LASTEXITCODE)" }
